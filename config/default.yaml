paths:
  data_dir: datasets                  # MNIST 下载和读取目录，必须位于项目目录内
  checkpoint_dir: ckpt                # 训练权重保存目录，VAE 和 Flow checkpoint 都放在这里
  output_dir: outputs                 # 可视化图片输出目录
  log_dir: logs                       # 训练日志或后续实验记录目录
  vae_checkpoint: ckpt/vae.pt         # VAE 训练完成后保存的权重文件
  flow_checkpoint: ckpt/flow.pt       # Flow 训练完成后保存的权重文件

data:
  batch_size: 128                     # DataLoader 每个 batch 的样本数
  num_workers: 2                      # DataLoader 子进程数量；Windows 调试时可改为 0
  download: true                      # 本地没有 MNIST 时是否由 torchvision 自动下载
  pin_memory: false                   # CUDA 训练时可改为 true，加速 CPU 到 GPU 拷贝

train:
  seed: 42                            # 随机种子，用于复现实验
  device: auto                        # 训练设备；auto 自动选择 cuda 或 cpu，也可显式写 cpu/cuda
  vae_epochs: 30                      # VAE 训练轮数
  flow_epochs: 50                     # Flow Matching 模型训练轮数
  vae_lr: 0.0001                      # VAE AdamW 学习率
  flow_lr: 0.0001                     # Flow AdamW 学习率
  weight_decay: 0.000001              # AdamW 权重衰减系数
  vae_kl_weight: 0.0001               # VAE KL 散度损失权重，不是 AdamW beta 参数
  grad_clip: 1.0                      # 梯度裁剪阈值，防止训练早期梯度过大
  log_interval: 100                   # 每隔多少个全局 step 打印一次训练日志
  max_train_steps: null               # 调试用总训练步数上限；null 表示不限制

model:
  image_channels: 1                   # MNIST 灰度图通道数
  image_size: 28                      # MNIST 图像边长
  num_classes: 10                     # MNIST 数字类别数量，标签范围为 0 到 9
  vae_hidden_channels: 64             # VAE 图像空间卷积隐藏通道数
  latent_channels: 32                 # VAE 潜变量通道数，也是 Flow 输入/输出投影层的端点通道数
  latent_size: 14                     # VAE 潜变量空间边长；应等于 image_size // 2
  flow_hidden_channels: 256           # Flow 主干隐藏通道数；输入投影 32->256，输出投影 256->32
  flow_depth: 8                       # Flow 条件 ConvNeXt 主干块数量
  convnext_expansion: 2               # ConvNeXt 块内 1x1 卷积通道扩展倍率
  time_frequencies: 16                # 时间 sin/cos 嵌入频率数量，输出维度为该值的 2 倍
  condition_dim: 128                  # 时间条件和数字条件融合后的向量维度

sample:
  sampling_steps: 16                  # Flow 训练离散时间步数，也是采样 Euler 步数
  history_steps: 16                   # 生成过程可视化保存的中间状态数量，不得大于 sampling_steps
  num_samples_per_digit: 8            # 每个数字默认生成样本数，供后续批量采样或扩展可视化使用

visual:
  pca_samples: 512                    # PCA 可视化最多使用的测试集样本数
  grid_columns: 10                    # 图像网格默认列数，适合按 0 到 9 排列
  feature_map_channels: 8             # 中间层特征图可视化展示的前多少个通道
  feature_map_time: 0.5               # 中间层特征图可视化使用的 Flow 时间点，范围 [0,1]
